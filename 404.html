<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found — ForageWild</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .err-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }
    .err-bg { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; }
    .err-ov { position: fixed; inset: 0; background: rgba(5,14,5,.78); z-index: 1; }
    .err-c  { position: relative; z-index: 2; color: #fff; max-width: 560px; }
    .errcode {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10rem;
      font-weight: 900;
      color: rgba(255,255,255,.1);
      line-height: 1;
      margin-bottom: -1.5rem;
    }
    .err-icon { font-size: 4.5rem; display: block; margin-bottom: 1rem; }
    @media (max-width: 480px) { .errcode { font-size: 6rem; } }
  </style>
</head>
<body>
  <div class="err-bg" style="background-image:url('https://images.unsplash.com/photo-1476231682828-37e571bc172f?w=1400&q=80');"></div>
  <div class="err-ov"></div>
  <div class="err-wrap">
    <div class="err-c">
      <div class="errcode">404</div>
      <span class="err-icon">🍄</span>
      <h1 style="color:#fff;font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:.7rem;">Page Lost in the Forest</h1>
      <p style="color:rgba(255,255,255,.72);max-width:420px;margin:0 auto 2.2rem;font-size:17px;">Looks like this mushroom doesn't exist. The page you're looking for has wandered off the trail and can't be found.</p>
      <div class="d-flex flex-wrap gap-3 justify-content-center">
        <a class="btn-g" href="index.html">← Back to Home</a>
        <a class="btn-a" href="contact.html">Contact Us</a>
      </div>
      <div style="margin-top:2.5rem;display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;">
        <a href="tours.html" style="color:rgba(255,255,255,.55);font-size:15px;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.55)'">Tours</a>
        <a href="about.html" style="color:rgba(255,255,255,.55);font-size:15px;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.55)'">About</a>
        <a href="gallery.html" style="color:rgba(255,255,255,.55);font-size:15px;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.55)'">Gallery</a>
        <a href="species.html" style="color:rgba(255,255,255,.55);font-size:15px;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.55)'">Species</a>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{initTheme();initDir();});</script>
  <!-- Scroll to Top -->
  <button id="scrollTopBtn" title="Back to top" aria-label="Back to top">
    <i class="bi bi-arrow-up"></i>
  </button>

</body>
</html>
