<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ForageWild</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .auth-bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    .auth-ov {
      position: fixed;
      inset: 0;
      background: rgba(8,20,8,.74);
      z-index: 1;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 80px rgba(0,0,0,.22);
      position: relative;
      z-index: 2;
    }
    .auth-logo { text-align: center; margin-bottom: 1.8rem; }
    .auth-logo img { width: 164px; object-fit: cover;  margin: 0 auto .65rem; display: block; }
    .auth-logo .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--primary); display: block; }
    .auth-logo .sub   { color: var(--text3); font-size: 15px; }
    .sbtn {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 11px;
      padding: .62rem 1rem;
      width: 100%;
      cursor: pointer;
      font-size: 17px !important;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all .22s;
      margin-bottom: .55rem;
    }
    .sbtn:hover { background: var(--bg); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .sbtn i { font-size: 18px; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.2rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 13px; color: var(--text3); white-space: nowrap; }
    .auth-footer { text-align: center; font-size: 15px; color: var(--text3); margin-top: 1.4rem; }
    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) { .auth-card { padding: 2rem 1.4rem; } }
  </style>
</head>
<body>

  <div class="auth-bg" style="background-image:url('https://images.unsplash.com/photo-1511884642898-4c92249e20b6?w=1400&q=80');"></div>
  <div class="auth-ov"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html"><img src="images/logo.png" alt="ForageWild"></a>
        
        <span class="sub">Welcome back, forager</span>
      </div>

      <!-- Social Buttons -->
      <button class="sbtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <button class="sbtn">
        <i class="bi bi-facebook" style="color:#1877F2;"></i>
        Continue with Facebook
      </button>
      <button class="sbtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--text)"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continue with Apple
      </button>

      <div class="divider"><span>or sign in with email</span></div>

      <!-- Email -->
      <label class="flabel">Email Address</label>
      <input type="email" class="finput" placeholder="your@email.com">

      <!-- Password with eye -->
      <label class="flabel">Password</label>
      <div class="finput-wrap" style="margin-bottom:.9rem;">
        <input type="password" class="finput" placeholder="••••••••" id="pw-login">
        <button class="finput-eye" type="button" onclick="toggleEye('pw-login','eye-login')">
          <i class="bi bi-eye" id="eye-login"></i>
        </button>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <label style="font-size:14px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" style="accent-color:var(--primary);"> Remember me
        </label>
        <a href="#" style="font-size:14px;color:var(--primary);text-decoration:none;font-weight:500;">Forgot password?</a>
      </div>

      <button class="btn-g" style="width:100%;text-align:center;padding:.8rem;">Sign In</button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up free</a>
      </div>
      
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    function toggleEye(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
    document.addEventListener('DOMContentLoaded', () => { initTheme(); initDir(); });
  </script>
  <!-- Scroll to Top -->
  <button id="scrollTopBtn" title="Back to top" aria-label="Back to top">
    <i class="bi bi-arrow-up"></i>
  </button>

</body>
</html>
